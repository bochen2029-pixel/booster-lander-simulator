name: ci
# Third-party attestation for the headless proof (see README "Why it is hard to fake"):
# every push rebuilds the core on a clean windows-latest runner (MSVC 2022) and re-runs
# the 10-oracle selftest (including the bit-identical determinism memcmp) plus a
# Monte-Carlo gate. The claims in the README do not require trusting the author's machine.
on: [push, pull_request]

jobs:
  selftest-and-mc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (MSVC 2022, /MT, /fp:precise)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Selftest — 10 physics oracles + determinism memcmp (hard gate)
        run: build\bin\Release\booster-core.exe --selftest

      - name: Monte-Carlo gate — TERMINAL seed 42 x200 must land >= 90%
        shell: pwsh
        run: |
          $out = & build\bin\Release\booster-core.exe --headless --scenario terminal --seed 42 --runs 200 2>&1
          $out | Write-Output
          if (-not ($out -join "`n" -match 'LANDED:\s+(\d+)/200')) { Write-Error "no LANDED line"; exit 1 }
          if ([int]$Matches[1] -lt 180) { Write-Error "TERMINAL below 90% gate"; exit 1 }
          exit 0

      - name: Monte-Carlo spot — ENTRY x50 + AERO_OFFSET x100 (informational)
        shell: pwsh
        run: |
          & build\bin\Release\booster-core.exe --headless --scenario entry --seed 42 --runs 50 2>&1 | Write-Output
          & build\bin\Release\booster-core.exe --headless --scenario aero_offset --seed 42 --runs 100 2>&1 | Write-Output
          exit 0
